<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="お問い合わせフォームのページです。">
  <title>Contact | Nakamura Profile</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <a class="skip-link" href="#main-content">本文へ移動</a>

  <header class="site-header">
    <div class="header-inner container">
      <a class="site-logo" href="index.html">
        NAKAMURA <span>PROFILE</span>
      </a>

      <button class="menu-button" type="button" aria-label="メニューを開閉" aria-expanded="false"
        aria-controls="global-navigation">
        <span class="menu-button__line"></span>
        <span class="menu-button__line"></span>
        <span class="menu-button__line"></span>
      </button>

      <nav class="global-nav" id="global-navigation" aria-label="メインナビゲーション">
        <ul class="nav-list">
          <li><a class="nav-link" href="index.html">TOP</a></li>
          <li><a class="nav-link" href="about.html">About</a></li>
          <li><a class="nav-link" href="skills.html">Skills</a></li>
          <li><a class="nav-link" href="favorite.html">Favorite</a></li>
          <li><a class="nav-link" href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main id="main-content">
    <section class="page-hero">
      <div class="page-hero__inner container">
        <div>
          <p class="section-heading__label">Contact</p>
          <h1 class="page-hero__title">お問い合わせ</h1>
          <p class="page-hero__text">ここにお問い合わせ案内を入力</p>
        </div>
        <img class="page-hero__image" src="img/contact.svg" alt="メッセージを表すイラスト">
      </div>
    </section>

    <section class="section">
      <div class="contact-layout container">
        <aside class="contact-side fade-in">
          <img src="img/contact.svg" alt="封筒と植物のイラスト">
          <h2>お気軽にどうぞ</h2>
          <p class="card__text">
            表示用メールアドレス：ここにメールアドレスを入力
          </p>
          <p class="card__text">※このフォームに送信機能はありません。</p>
        </aside>

        <form class="form fade-in" id="contact-form" novalidate>
          <div class="form__group">
            <label class="form__label" for="name">
              名前<span class="form__required">必須</span>
            </label>
            <input class="form__input" type="text" id="name" name="name" autocomplete="name" required
              aria-describedby="name-error">
            <p class="form__error" id="name-error" aria-live="polite"></p>
          </div>

          <div class="form__group">
            <label class="form__label" for="email">
              メールアドレス<span class="form__required">必須</span>
            </label>
            <input class="form__input" type="email" id="email" name="email" autocomplete="email" required
              aria-describedby="email-error">
            <p class="form__error" id="email-error" aria-live="polite"></p>
          </div>

          <div class="form__group">
            <label class="form__label" for="subject">
              件名<span class="form__required">必須</span>
            </label>
            <input class="form__input" type="text" id="subject" name="subject" required
              aria-describedby="subject-error">
            <p class="form__error" id="subject-error" aria-live="polite"></p>
          </div>

          <div class="form__group">
            <label class="form__label" for="message">
              内容<span class="form__required">必須</span>
            </label>
            <textarea class="form__input" id="message" name="message" required
              aria-describedby="message-error"></textarea>
            <p class="form__error" id="message-error" aria-live="polite"></p>
          </div>

          <button class="button" type="submit">入力内容を確認</button>
          <p class="form__status" role="status" hidden></p>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="footer-inner container">
      <div>
        <a class="site-logo" href="index.html">NAKAMURA PROFILE</a>
        <p>ここにサイトの説明を入力</p>
      </div>

      <ul class="footer-nav">
        <li><a href="index.html">TOP</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="favorite.html">Favorite</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>

    <p class="footer-copy">&copy; 2026 Nakamura Profile.</p>
  </footer>

  <button class="back-to-top" type="button" aria-label="ページ上部へ戻る">
    ↑
  </button>

  <script src="js/script.js"></script>
</body>

</html>
